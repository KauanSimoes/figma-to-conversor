<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Figma Converter | Detroit Edition</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <h2>Figma<span>Converter</span></h2>
            <nav>
                <button class="nav-btn active" onclick="switchTab('mta')">MTA (Lua)</button>
                <button class="nav-btn" onclick="switchTab('cpp')">C++ (ImGui)</button>
            </nav>
        </aside>

        <main class="content">
            <header>
                <h1>Conversor de Design</h1>
                <p>Cole o JSON do seu Frame abaixo para gerar o código instantaneamente.</p>
            </header>

            <section class="config-panel">
                <label style="color: #888; font-size: 0.8rem; display: block; margin-bottom: 10px;">JSON do Figma (Copie o Frame e use o comando no Console)</label>
                <textarea id="figma-json" placeholder="Cole aqui o resultado do comando: copy(figma.currentPage.selection[0])"></textarea>
                <button class="btn-primary" onclick="processJSON()">Gerar Código</button>
            </section>

            <section class="output-panel">
                <div class="header-output">
                    <span id="label-output">Resultado:</span>
                    <button class="btn-copy" onclick="copyCode()">Copiar Código</button>
                </div>
                <pre id="code-output" class="code-box">Aguardando JSON...</pre>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
